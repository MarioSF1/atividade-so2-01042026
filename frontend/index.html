<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Corporativo - Docker App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@1.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 10px; }
        .header-section { margin-bottom: 30px; border-left: 5px solid #0d6efd; padding-left: 15px; }
        .table thead { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 class="display-5 fw-bold">Painel de Controle</h1>
        <p class="text-muted" id="api-status">Aguardando conexão com o servidor...</p>
    </div>

    <div class="mb-4">
        <button class="btn btn-primary btn-lg" onclick="carregarDados()">
            Atualizar Relatórios
        </button>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card p-4">
                <h3 class="mb-3 text-primary">Lista de Clientes</h3>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-clientes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card p-4">
                <h3 class="mb-3 text-success">Lista de Funcionários</h3>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome/Cargo</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-funcionarios">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function carregarDados() {
    const apiBase = 'http://localhost:8000';
    
    try {
        // Chamada paralela para otimizar performance
        const [resStatus, resClientes, resFuncionarios] = await Promise.all([
            fetch(`${apiBase}/api`),
            fetch(`${apiBase}/listar-clientes`),
            fetch(`${apiBase}/listar-funcionarios`)
        ]);

        const statusData = await resStatus.json();
        const clientes = await resClientes.json();
        const funcionarios = await resFuncionarios.json();

        // Atualiza mensagem de status
        document.getElementById("api-status").innerText = `Servidor: ${statusData.message || statusData.status}`;

        // Renderiza Clientes
        renderizarTabela("tabela-clientes", clientes);
        
        // Renderiza Funcionários
        renderizarTabela("tabela-funcionarios", funcionarios);

    } catch (error) {
        console.error("Erro ao buscar dados:", error);
        document.getElementById("api-status").innerText = "Erro: Servidor não encontrado (localhost:8000)";
        document.getElementById("api-status").className = "text-danger";
    }
}

function renderizarTabela(idElemento, lista) {
    const tbody = document.getElementById(idElemento);
    tbody.innerHTML = ""; 

    if (lista.length === 0) {
        tbody.innerHTML = "<tr><td colspan='2' class='text-center'>Nenhum dado encontrado</td></tr>";
        return;
    }

    lista.forEach(item => {
        const row = `<tr>
            <td><strong>#${item.id}</strong></td>
            <td>${item.name}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

// Carrega os dados automaticamente ao abrir a página
window.onload = carregarDados;
</script>

</body>
</html>
